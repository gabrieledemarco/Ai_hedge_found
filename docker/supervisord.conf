[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

[program:ib-gateway]
; Only starts if IB_ACCOUNT is configured — see start.sh for conditional launch
command=/opt/ibkr/start_ibkr.sh
directory=/opt/ibkr/clientportal.gw
autostart=false             ; start.sh enables this conditionally
autorestart=true
startretries=3
startsecs=15                ; give gateway time to boot before declaring it up
stdout_logfile=/var/log/supervisor/ib-gateway.log
stderr_logfile=/var/log/supervisor/ib-gateway-err.log
stdout_logfile_maxbytes=10MB
priority=10

[program:scheduler]
command=python /app/scripts/scheduler.py
directory=/app
autostart=true
autorestart=true
startretries=5
startsecs=5
stdout_logfile=/var/log/supervisor/scheduler.log
stderr_logfile=/var/log/supervisor/scheduler-err.log
stdout_logfile_maxbytes=10MB
environment=PYTHONUNBUFFERED="1",PYTHONPATH="/app/scripts"
priority=20

[unix_http_server]
file=/var/run/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory=supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///var/run/supervisor.sock
