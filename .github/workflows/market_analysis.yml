name: Market Analysis (Sentiment + Fundamentals)

on:
  schedule:
    - cron: "30 5 * * 1-5"  # 05:30 UTC = 07:30 IT (before market open)
  workflow_dispatch:

permissions:
  contents: write

env:
  ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  market_analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: ${{ runner.os }}-hf-finbert-v1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch latest data from remote
        run: |
          git fetch origin main
          git checkout origin/main -- data/ || true

      - name: Run fundamentals + momentum fetch
        run: python scripts/fetch_fundamentals.py
        working-directory: ${{ github.workspace }}

      - name: Run sentiment fetch (FinBERT + Alpha Vantage)
        run: python scripts/fetch_sentiment.py
        working-directory: ${{ github.workspace }}

      - name: Run TradingView screener
        run: python scripts/tradingview_screener.py
        working-directory: ${{ github.workspace }}

      - name: Commit signals
        run: |
          git config user.name "Market Analysis Bot"
          git config user.email "bot@paper-trading.local"
          git add data/signals.json data/tv_screener.json
          if git diff --cached --quiet; then
            echo "No signal changes"
          else
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: market signals update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
