name: Paper Trading Pipeline

on:
  schedule:
    # Mattina ~08:15 IT: 06:15 UTC (CEST) / 07:15 UTC (CET)
    - cron: "15 6 * * 1-5"
    # Pomeriggio ~17:15 IT: 15:15 UTC (CEST) / 16:15 UTC (CET)
    - cron: "15 15 * * 1-5"
    # Sera ~22:30 IT: 20:30 UTC (CEST) / 21:30 UTC (CET)
    - cron: "30 20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

env:
  TIINGO_API_KEY: ${{ secrets.TIINGO_API_KEY }}
  ALPHA_VANTAGE_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
  TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  run_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance matplotlib

      - name: Determine session hour
        id: session
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -eq 6 ] || [ "$HOUR" -eq 7 ]; then
            echo "hour=7" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -eq 15 ] || [ "$HOUR" -eq 16 ]; then
            echo "hour=15" >> "$GITHUB_OUTPUT"
          else
            echo "hour=21" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch latest portfolio from remote
        run: |
          git fetch origin main
          git checkout origin/main -- data/portfolio_history.json

      - name: Run pipeline
        run: |
          python scripts/main_pipeline.py --hour ${{ steps.session.outputs.hour }}
        working-directory: ${{ github.workspace }}

      - name: Commit and push updated portfolio JSON
        run: |
          git config user.name "Paper Trading Bot"
          git config user.email "bot@paper-trading.local"
          git add data/portfolio_history.json docs/index.html
          if git diff --cached --quiet; then
            echo "No changes to portfolio — skipping commit"
          else
            git fetch origin main
            git reset --soft origin/main
            git commit -m "chore: portfolio update $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi
